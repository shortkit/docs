<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShortKit Docs — Proposed Restructure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #FF6600;
  --primary-soft: #fff8f5;
  --bg: #ffffff;
  --bg-sidebar: #fafafa;
  --text: #1a1a1e;
  --text-soft: #6b7280;
  --border: #e5e7eb;
  --code-bg: #f6f6f7;
}
[data-theme="dark"] {
  --primary: #FF7a26;
  --primary-soft: #2a1d14;
  --bg: #0f0f12;
  --bg-sidebar: #121216;
  --text: #ececef;
  --text-soft: #9ca3af;
  --border: #26262c;
  --code-bg: #1b1b21;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}
code, .mono { font-family: 'JetBrains Mono', monospace; }

/* ── Topbar ─────────────────────────── */
.topbar {
  display: flex; align-items: center; gap: 24px;
  height: 56px; padding: 0 24px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg); z-index: 50;
}
.logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 17px; }
.logo .dot { width: 22px; height: 22px; border-radius: 6px; background: var(--primary); display:inline-flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:800; }
.searchbox {
  flex: 0 1 380px; display: flex; align-items: center; gap: 8px;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 12px; color: var(--text-soft); background: var(--bg-sidebar);
  cursor: default; font-size: 13px;
}
.searchbox kbd { margin-left: auto; border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 11px; background: var(--bg); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; font-size: 13.5px; }
.topbar-right a { color: var(--text-soft); text-decoration: none; }
.btn-primary { background: var(--primary); color: #fff !important; padding: 7px 14px; border-radius: 8px; font-weight: 600; }
.theme-toggle { cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text-soft); border-radius: 8px; padding: 6px 10px; font-size: 13px; }

/* ── Banner ─────────────────────────── */
.banner {
  background: var(--primary-soft); border-bottom: 1px solid var(--border);
  padding: 10px 24px; font-size: 13px; color: var(--text);
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.banner strong { color: var(--primary); }
.legend { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }

/* ── Tabs ───────────────────────────── */
.tabs {
  display: flex; gap: 4px; padding: 0 24px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; background: var(--bg); z-index: 40;
}
.tab {
  padding: 11px 14px; font-size: 13.5px; font-weight: 500;
  color: var(--text-soft); cursor: pointer;
  border-bottom: 2px solid transparent; display: flex; gap: 7px; align-items: center;
}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab .count { font-size: 11px; background: var(--code-bg); border-radius: 10px; padding: 1px 7px; }

/* ── Layout ─────────────────────────── */
.layout { display: flex; min-height: calc(100vh - 110px); }
.sidebar {
  width: 290px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg-sidebar);
  padding: 20px 12px 60px;
  position: sticky; top: 105px; height: calc(100vh - 105px); overflow-y: auto;
}
.group-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text-soft);
  padding: 16px 12px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 8px; cursor: pointer;
  font-size: 13.5px; color: var(--text); line-height: 1.4;
}
.nav-item:hover { background: var(--code-bg); }
.nav-item.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
.nav-item.child { margin-left: 16px; border-left: 1px solid var(--border); border-radius: 0 8px 8px 0; }
.nav-item .label { flex: 1; }

/* status badges */
.badge {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em;
  padding: 2px 6px; border-radius: 5px; text-transform: uppercase; flex-shrink: 0;
}
.badge.new        { background: #dcfce7; color: #15803d; }
.badge.moved      { background: #dbeafe; color: #1d4ed8; }
.badge.split      { background: #fef3c7; color: #b45309; }
.badge.merged     { background: #ede9fe; color: #6d28d9; }
.badge.rewritten  { background: #ffe4e6; color: #be123c; }
.badge.updated    { background: #e0f2fe; color: #0369a1; }
.badge.unchanged  { background: var(--code-bg); color: var(--text-soft); }
.badge.delete     { background: #fee2e2; color: #b91c1c; text-decoration: line-through; }
[data-theme="dark"] .badge.delete    { background: #3f1212; color: #fca5a5; }
[data-theme="dark"] .badge.new       { background: #14321f; color: #4ade80; }
[data-theme="dark"] .badge.moved     { background: #172a54; color: #93b4fd; }
[data-theme="dark"] .badge.split     { background: #3a2a08; color: #fbbf24; }
[data-theme="dark"] .badge.merged    { background: #2a1e4d; color: #c4b5fd; }
[data-theme="dark"] .badge.rewritten { background: #42141c; color: #fda4af; }
[data-theme="dark"] .badge.updated   { background: #0c2d3f; color: #7dd3fc; }

/* ── Content ────────────────────────── */
.content { flex: 1; padding: 36px 56px 120px; max-width: 880px; }
.crumb { font-size: 12.5px; color: var(--primary); font-weight: 600; margin-bottom: 10px; }
h1.page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; }
.page-desc { color: var(--text-soft); font-size: 15px; margin-bottom: 24px; line-height: 1.55; }
.meta-card {
  border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 20px; margin-bottom: 16px; background: var(--bg-sidebar);
}
.meta-card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-soft); margin-bottom: 10px; }
.meta-card p, .meta-card li { font-size: 13.5px; line-height: 1.6; }
.meta-card ul { padding-left: 18px; }
.source-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--code-bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 9px; font-size: 12px; margin: 2px 4px 2px 0;
  font-family: 'JetBrains Mono', monospace;
}
.arrow { color: var(--primary); font-weight: 700; }
.skeleton { margin-top: 28px; }
.skeleton .sk-h { height: 14px; border-radius: 4px; background: var(--code-bg); margin-bottom: 12px; }
.skeleton .sk-code {
  border: 1px solid var(--border); border-radius: 10px; background: var(--code-bg);
  padding: 14px; font-size: 12px; color: var(--text-soft); margin: 16px 0;
  font-family: 'JetBrains Mono', monospace;
}

/* overview screen */
.overview h1 { font-size: 30px; margin-bottom: 8px; letter-spacing: -0.02em; }
.overview > p { color: var(--text-soft); font-size: 15px; line-height: 1.6; margin-bottom: 24px; max-width: 720px; }
.stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
.stat {
  border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px;
  font-size: 13px; color: var(--text-soft); display: flex; gap: 8px; align-items: baseline;
}
.stat b { color: var(--text); font-size: 16px; }
.section-block { margin-bottom: 28px; }
.section-block h2 { font-size: 18px; margin-bottom: 10px; letter-spacing: -0.01em; }
.section-block p, .section-block li { font-size: 14px; line-height: 1.65; }
.section-block ul, .section-block ol { padding-left: 20px; }
.section-block li { margin-bottom: 6px; }
details.proposal { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; }
details.proposal summary { padding: 12px 16px; cursor: pointer; font-weight: 600; font-size: 13.5px; }
details.proposal .body { padding: 0 16px 16px; font-size: 13px; line-height: 1.6; color: var(--text-soft); white-space: pre-wrap; }
table.plan { width: 100%; border-collapse: collapse; font-size: 13px; }
table.plan th, table.plan td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
table.plan th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-soft); }
.note {
  border-left: 3px solid var(--primary); background: var(--primary-soft);
  padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 13.5px; line-height: 1.6; margin: 14px 0;
}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="logo"><span class="dot">S</span> shortkit</div>
  <div class="searchbox">🔍 Search or ask... <kbd>⌘K</kbd></div>
  <div class="topbar-right">
    <a href="#">Home</a>
    <button class="theme-toggle" onclick="toggleTheme()">◐ theme</button>
    <a href="#" class="btn-primary">Contact Us</a>
  </div>
</div>

<div class="banner">
  <span>📐 <strong>Proposed restructure</strong> — interactive mockup. Click any sidebar item to see what changes on that page. Nothing here is live.</span>
  <div class="legend" id="legend"></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content"></main>
</div>

<script>
const BADGES = ['new','moved','split','merged','rewritten','updated','unchanged'];
let state = { tab: -1, page: null };
const ACTION_BADGE = { keep:'unchanged', update:'updated', move:'moved', split:'split', merge:'merged', rewrite:'rewritten', delete:'delete' };

function toggleTheme() {
  document.body.dataset.theme = document.body.dataset.theme === 'light' ? 'dark' : 'light';
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function badge(status) { return `<span class="badge ${status}">${status}</span>`; }

function renderLegend() {
  document.getElementById('legend').innerHTML = BADGES.map(badge).join('');
}

function renderTabs() {
  const tabs = window.IA.navigation.map((t, i) => {
    const n = t.groups.reduce((a,g)=>a+g.pages.length + g.pages.reduce((b,p)=>b+(p.children?.length||0),0), 0);
    return `<div class="tab ${i===state.tab?'active':''}" onclick="setTab(${i})">${esc(t.tab)} <span class="count">${n}</span></div>`;
  }).join('');
  document.getElementById('tabs').innerHTML = tabs + `<div class="tab ${state.tab===-1?'active':''}" onclick="setTab(-1)">📋 Plan &amp; rationale</div>`;
}

function setTab(i) { state.tab = i; state.page = null; render(); }

function navItem(p, child) {
  const active = state.page === p ? 'active' : '';
  return `<div class="nav-item ${child?'child':''} ${active}" onclick='setPage(${JSON.stringify(p.path)})'>
    <span class="label">${esc(p.title)}</span>${p.status!=='unchanged'?badge(p.status):''}</div>`;
}

let pageIndex = {};
function indexPages() {
  pageIndex = {};
  window.IA.navigation.forEach((t,ti) => t.groups.forEach(g => g.pages.forEach(p => {
    pageIndex[p.path] = { ...p, tab: ti, group: g.group };
    (p.children||[]).forEach(c => pageIndex[c.path] = { ...c, tab: ti, group: g.group, parent: p.title });
  })));
}

function setPage(path) {
  const p = pageIndex[path];
  if (!p) return;
  state.tab = p.tab; state.page = pageIndex[path] && Object.values(pageIndex).find(x=>x.path===path) ? findPageObj(path) : null;
  state.page = findPageObj(path);
  render();
}

function findPageObj(path) {
  for (const t of window.IA.navigation) for (const g of t.groups) for (const p of g.pages) {
    if (p.path === path) return p;
    for (const c of (p.children||[])) if (c.path === path) return c;
  }
  return null;
}

function renderSidebar() {
  if (state.tab === -1) { document.getElementById('sidebar').innerHTML = ''; return; }
  const t = window.IA.navigation[state.tab];
  document.getElementById('sidebar').innerHTML = t.groups.map(g =>
    `<div class="group-title">${esc(g.group)}</div>` +
    g.pages.map(p => navItem(p,false) + (p.children||[]).map(c=>navItem(c,true)).join('')).join('')
  ).join('');
}

function renderPage(p) {
  const meta = pageIndex[p.path] || {};
  const sources = (p.sourcePages||[]).map(s=>`<span class="source-chip">${esc(s)}</span>`).join(' ');
  return `
    <div class="crumb">${esc(meta.group||'')}${meta.parent? ' › '+esc(meta.parent):''}</div>
    <h1 class="page-title">${esc(p.title)} ${badge(p.status)}</h1>
    <p class="page-desc mono">${esc(p.path)}.mdx</p>
    <div class="meta-card"><h3>What this page covers</h3><p>${esc(p.summary)}</p></div>
    ${sources ? `<div class="meta-card"><h3>Built from</h3>${sources} <span class="arrow">→</span> <span class="source-chip">${esc(p.path)}.mdx</span></div>` : ''}
    <div class="skeleton">
      <div class="sk-h" style="width:40%"></div>
      <div class="sk-h" style="width:86%"></div>
      <div class="sk-h" style="width:78%"></div>
      <div class="sk-code">// content preview — written during execution phase</div>
      <div class="sk-h" style="width:64%"></div>
      <div class="sk-h" style="width:70%"></div>
    </div>`;
}

function renderOverview() {
  const ia = window.IA;
  const allPages = Object.values(pageIndex);
  const counts = {};
  allPages.forEach(p => counts[p.status] = (counts[p.status]||0)+1);
  return `<div class="overview">
    <h1>Proposed docs restructure</h1>
    <p>${esc(window.META.overviewNote)}</p>
    <div class="stat-row">
      <div class="stat"><b>${allPages.length}</b> pages</div>
      ${BADGES.filter(b=>counts[b]).map(b=>`<div class="stat"><b>${counts[b]}</b> ${b}</div>`).join('')}
    </div>
    <div class="section-block"><h2>Design rationale</h2><p style="white-space:pre-wrap">${esc(ia.rationale)}</p></div>
    <div class="section-block"><h2>Fate of every existing page</h2>
      <table class="plan"><tr><th>Current page</th><th>Action</th><th>Detail</th></tr>
      ${ia.pagePlan.map(r=>`<tr><td class="mono">${esc(r.oldPath)}</td><td>${badge(ACTION_BADGE[r.action]||r.action)}</td><td>${esc(r.detail)}</td></tr>`).join('')}
      </table></div>
    <div class="section-block"><h2>API reference augmentations</h2>
      <ul>${(ia.apiAugmentations||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    <div class="section-block"><h2>Content work items (non-structural)</h2>
      <ul>${(ia.contentWorkItems||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    <div class="section-block"><h2>Open questions for you</h2>
      <div class="note"><ul>${(ia.openQuestions||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div></div>
  </div>`;
}

function render() {
  if (!window.IA) {
    document.getElementById('content').innerHTML = '<div class="overview"><h1>Awaiting synthesis…</h1><p>The survey workflow has not injected IA data yet.</p></div>';
    return;
  }
  indexPages();
  renderLegend();
  renderTabs();
  renderSidebar();
  const el = document.getElementById('content');
  if (state.tab === -1) { el.innerHTML = renderOverview(); return; }
  if (!state.page) {
    const first = window.IA.navigation[state.tab].groups[0].pages[0];
    state.page = first;
  }
  el.innerHTML = renderPage(state.page);
}

render();
</script>
</body>
</html>
